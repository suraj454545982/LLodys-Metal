<template>

    
    <template if:true={showComponent}>
        <div class="slds-card">
            <lightning-accordion allow-multiple-sections-open class="slds-p-around_medium">

                <lightning-accordion-section name="opp" label="Opportunity Information">
                    <template if:true={oppRecId}>
                        <lightning-record-view-form
                            record-id={oppRecId}
                            object-api-name="Opportunity"
                            density="comfy"
                        >
                            <div class="slds-grid slds-wrap">
                                <template for:each={oppFields} for:item="field">
                                    <div class="slds-size_1-of-2 slds-p-around_x-small" key={field}>
                                        <lightning-output-field field-name={field}></lightning-output-field>
                                    </div>
                                </template>
                            </div>
                        </lightning-record-view-form>
                    </template>
                </lightning-accordion-section>

                <lightning-accordion-section name="quote" label="Quote Information">
                    <template if:true={quoteId}>
                        <lightning-record-view-form
                            record-id={quoteId}
                            object-api-name="Quote"
                            density="comfy"
                        >
                            <div class="slds-grid slds-wrap">
                                <template for:each={quoteFields} for:item="field">
                                    <div class="slds-size_1-of-2 slds-p-around_x-small" key={field}>
                                        <lightning-output-field field-name={field}></lightning-output-field>
                                    </div>
                                </template>
                            </div>
                        </lightning-record-view-form>
                    </template>
                </lightning-accordion-section>
                <lightning-accordion-section name="quoteLineItems" label="Quote Line Items">
                    <template if:true={quoteLineItems}>
                        <lightning-datatable
                            key-field="Id"
                            data={quoteLineItems}
                            columns={quoteLineItemColumns}
                            hide-checkbox-column
                        ></lightning-datatable>
                    </template>
                </lightning-accordion-section>

            </lightning-accordion>
        </div>
    </template>
</template>
