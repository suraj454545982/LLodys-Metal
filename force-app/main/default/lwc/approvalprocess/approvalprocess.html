<template>
    <template if:true={showPOComponent}>
        <div class="slds-card slds-p-around_medium">
            <h2 class="slds-text-heading_medium">Purchase Order Details</h2>
            <div class="slds-grid slds-wrap">
                <div class="slds-size_1-of-2 slds-p-around_x-small">
                    <p>
                        <strong>PO Number: </strong>
                        <lightning-formatted-url
                            value={poRecordUrl}
                            label={purchaseOrder.Name}
                            target="_blank"
                            class="slds-text-link"
                        ></lightning-formatted-url>
                    </p>
                </div>

                <div class="slds-size_1-of-2 slds-p-around_x-small">
                    <p><strong>PO Date: </strong>
                        <lightning-formatted-date-time
                            value={purchaseOrder.PO_Date__c}
                            year="numeric"
                            month="2-digit"
                            day="2-digit"
                        ></lightning-formatted-date-time>
                    </p>
                </div>

                <div class="slds-size_1-of-2 slds-p-around_x-small">
                    <p><strong>PO Category: </strong> {purchaseOrder.PO_Category__c}</p>
                </div>

                <div class="slds-size_1-of-2 slds-p-around_x-small">
                    <p><strong>Currency: </strong> {purchaseOrder.CurrencyIsoCode}</p>
                </div>

                <div class="slds-size_1-of-2 slds-p-around_x-small">
                    <p><strong>Quantity: </strong>
                        <lightning-formatted-number value={purchaseOrder.Quantity__c}></lightning-formatted-number>
                    </p>
                </div>

                <div class="slds-size_1-of-2 slds-p-around_x-small">
                    <p><strong>Total Amount: </strong>
                        <lightning-formatted-number
                            value={purchaseOrder.Total_Amount__c}
                            format-style="currency"
                            currency-code={purchaseOrder.CurrencyIsoCode}
                        ></lightning-formatted-number>
                    </p>
                </div>

                <div class="slds-size_1-of-2 slds-p-around_x-small">
                    <p><strong>Opportunity: </strong>
                        <lightning-formatted-url
                            value={opportunityUrl}
                            label={purchaseOrder.Opportunity__r.Name}
                            target="_blank"
                            class="slds-text-link"
                        ></lightning-formatted-url>
                    </p>
                </div>

                <div class="slds-size_1-of-2 slds-p-around_x-small">
                    <p><strong>Quote: </strong>
                        <lightning-formatted-url
                            value={quoteUrl}
                            label={purchaseOrder.Quote__r.Name}
                            target="_blank"
                            class="slds-text-link"
                        ></lightning-formatted-url>
                    </p>
                </div>

                <div class="slds-size_1-of-2 slds-p-around_x-small">
                    <p><strong>Owner: </strong> {purchaseOrder.Owner.Name}</p>
                </div>

                <div class="slds-size_1-of-2 slds-p-around_x-small">
                    <p><strong>Created By: </strong> {purchaseOrder.CreatedBy.Name},
                        <lightning-formatted-date-time value={purchaseOrder.CreatedDate}></lightning-formatted-date-time>
                    </p>
                </div>

                <div class="slds-size_1-of-2 slds-p-around_x-small">
                    <p><strong>Last Modified By: </strong> {purchaseOrder.LastModifiedBy.Name},
                        <lightning-formatted-date-time value={purchaseOrder.LastModifiedDate}></lightning-formatted-date-time>
                    </p>
                </div>
            </div>
        </div>
    </template>

    <template if:true={showAccountComponent}>
        <div class="slds-card slds-p-around_medium">
            <h2 class="slds-text-heading_medium">Account Details </h2>
            <lightning-record-view-form
                record-id={accountRecord.Id}
                object-api-name="Account"
                density="comfy"
            >
                <div class="slds-grid slds-wrap">
                    <template for:each={accountFields} for:item="field">
                        <div key={field} class="slds-size_1-of-2 slds-p-around_x-small">
                            <lightning-output-field field-name={field}></lightning-output-field>
                        </div>
                    </template>
                </div>
            </lightning-record-view-form>
        </div>
    </template>
</template>
